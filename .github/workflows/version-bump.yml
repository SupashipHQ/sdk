name: Version Bump and Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
          - premajor
          - preminor
          - prepatch
          - prerelease
      prerelease_id:
        description: "Prerelease identifier (only used for prerelease versions)"
        required: false
        type: choice
        options:
          - alpha
          - beta
          - rc
          - dev
          - canary
          - next

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  version-bump:
    runs-on: ubuntu-latest
    name: Bump Version and Create Release
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # - name: Run tests
      #   run: pnpm test

      - name: Bump version in root package.json
        id: version-root
        run: |
          VERSION_TYPE="${{ github.event.inputs.version_type }}"
          PRERELEASE_ID="${{ github.event.inputs.prerelease_id }}"

          # Handle prerelease versions
          if [[ "$VERSION_TYPE" == pre* ]]; then
            # Use default 'beta' if no prerelease_id is provided for prerelease versions
            if [[ -z "$PRERELEASE_ID" ]]; then
              PRERELEASE_ID="beta"
              echo "⚠️  No prerelease identifier provided, defaulting to 'beta'"
            fi
            NEW_VERSION=$(npm version "$VERSION_TYPE" --preid="$PRERELEASE_ID" --no-git-tag-version)
            echo "🧪 Creating prerelease version with identifier: $PRERELEASE_ID"
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(npm version "$VERSION_TYPE" --no-git-tag-version)
            echo "🚀 Creating stable release version"
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Root package.json bumped to $NEW_VERSION"

      - name: Bump version in packages (ordered)
        run: |
          # Source the shared package configuration
          source .github/scripts/package-config.sh

          NEW_VERSION="${{ steps.version-root.outputs.new_version }}"
          VERSION_NUMBER="${NEW_VERSION#v}"  # Remove 'v' prefix

          # Define the version bump handler function
          process_version() {
            local package_name="$1"
            local package_path="$2"
            
            echo "🔄 Updating version in $package_path to $VERSION_NUMBER"
            
            # Update package version using Node.js instead of npm version (which can fail in workspaces)
            node -e "
              const fs = require('fs');
              const path = './$package_path/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = '$VERSION_NUMBER';
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
              console.log('Updated ' + pkg.name + ' to version $VERSION_NUMBER');
            "
            
            # Get the package name that was just version bumped
            local bumped_package_name=$(node -e "console.log(require('./$package_path/package.json').name)")
            
            echo "🔍 Checking for packages that depend on $bumped_package_name..."
            
            # Find all packages that depend on the package that was just bumped
            for other_package in packages/*; do
              if [ -d "$other_package" ] && [ -f "$other_package/package.json" ] && [ "$other_package" != "$package_path" ]; then
                # Check if this package has a dependency on the bumped package
                local has_dependency=$(node -e "
                  const pkg = JSON.parse(require('fs').readFileSync('$other_package/package.json', 'utf8'));
                  const deps = { ...pkg.dependencies, ...pkg.devDependencies, ...pkg.peerDependencies };
                  console.log(deps['$bumped_package_name'] ? 'true' : 'false');
                ")
                
                if [ "$has_dependency" = "true" ]; then
                  local other_package_name=$(basename "$other_package")
                  echo "🔗 Updating $other_package_name dependency on $bumped_package_name"
                  
                  # Update the dependency version using Node.js with workspace protocol
                  node -e "
                    const fs = require('fs');
                    const pkg = JSON.parse(fs.readFileSync('$other_package/package.json', 'utf8'));
                    
                    // Update in dependencies using workspace protocol for internal packages
                    if (pkg.dependencies && pkg.dependencies['$bumped_package_name']) {
                      pkg.dependencies['$bumped_package_name'] = 'workspace:^$VERSION_NUMBER';
                    }
                    
                    // Update in devDependencies using workspace protocol for internal packages
                    if (pkg.devDependencies && pkg.devDependencies['$bumped_package_name']) {
                      pkg.devDependencies['$bumped_package_name'] = 'workspace:^$VERSION_NUMBER';
                    }
                    
                    // Update in peerDependencies using workspace protocol for internal packages
                    if (pkg.peerDependencies && pkg.peerDependencies['$bumped_package_name']) {
                      pkg.peerDependencies['$bumped_package_name'] = 'workspace:^$VERSION_NUMBER';
                    }
                    
                    fs.writeFileSync('$other_package/package.json', JSON.stringify(pkg, null, 2) + '\n');
                  "
                  
                  echo "✅ Updated $other_package_name dependency to ^$VERSION_NUMBER"
                fi
              fi
            done
          }

          # Process packages in the defined order
          process_packages_in_order "version"

      - name: Update pnpm lockfile
        run: pnpm install --lockfile-only

      - name: Commit version changes
        id: commit-changes
        run: |
          NEW_VERSION="${{ steps.version-root.outputs.new_version }}"
          git add .
          if git diff --cached --quiet; then
            echo "No version changes detected; skipping commit."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: bump version to $NEW_VERSION

          - Updated all workspace packages to $NEW_VERSION
          - Updated cross-package dependencies automatically"
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Prepare release branch name
        id: release-branch
        if: steps.commit-changes.outputs.has_changes == 'true'
        run: |
          NEW_VERSION="${{ steps.version-root.outputs.new_version }}"
          RELEASE_BRANCH="release/${NEW_VERSION#v}"
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Check for existing PR
        id: existing-pr
        if: steps.commit-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_BRANCH="${{ steps.release-branch.outputs.release_branch }}"
          EXISTING_PR_URL=$(gh pr list \
            --base main \
            --head "$RELEASE_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url')

          if [ -n "$EXISTING_PR_URL" ]; then
            echo "Found existing PR: $EXISTING_PR_URL"
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "url=$EXISTING_PR_URL" >> $GITHUB_OUTPUT
          else
            echo "No existing PR found."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Replace release branch when safe
        id: push-branch
        if: steps.commit-changes.outputs.has_changes == 'true' && steps.existing-pr.outputs.exists == 'false'
        run: |
          RELEASE_BRANCH="${{ steps.release-branch.outputs.release_branch }}"

          # If a stale remote release branch exists and no open PR references it, replace it.
          if git ls-remote --heads origin "$RELEASE_BRANCH" | grep -q "$RELEASE_BRANCH"; then
            echo "Remote branch $RELEASE_BRANCH exists. Deleting before pushing fresh branch..."
            git push origin --delete "$RELEASE_BRANCH"
          fi

          git checkout -B "$RELEASE_BRANCH"
          git push --set-upstream origin "$RELEASE_BRANCH"
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Collect merged PRs since last release
        id: merged-prs
        if: steps.commit-changes.outputs.has_changes == 'true' && steps.existing-pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_RELEASE_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')

          if [ -n "$LAST_RELEASE_TAG" ]; then
            LAST_RELEASE_DATE=$(gh release view "$LAST_RELEASE_TAG" --json publishedAt --jq '.publishedAt')
          else
            LAST_RELEASE_DATE=""
          fi

          if [ -n "$LAST_RELEASE_DATE" ]; then
            echo "Collecting merged PRs after release $LAST_RELEASE_TAG ($LAST_RELEASE_DATE)"
            MERGED_PRS=$(gh pr list \
              --state merged \
              --base main \
              --search "merged:>$LAST_RELEASE_DATE" \
              --json number,title,url,mergedAt \
              --limit 200 \
              --jq 'sort_by(.mergedAt) | .[] | "- #\(.number) \(.title) (\(.url))"')
          else
            echo "No prior release found. No merged PR baseline available."
            MERGED_PRS=""
          fi

          {
            echo "last_release_tag=$LAST_RELEASE_TAG"
            echo "last_release_date=$LAST_RELEASE_DATE"
            echo "items<<EOF"
            if [ -n "$MERGED_PRS" ]; then
              echo "$MERGED_PRS"
            else
              echo "- No merged PRs found since the last release."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.commit-changes.outputs.has_changes == 'true' && steps.existing-pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_VERSION="${{ steps.version-root.outputs.new_version }}"
          RELEASE_BRANCH="${{ steps.release-branch.outputs.release_branch }}"
          TEAM_REVIEWER="${{ github.repository_owner }}/sdk-core"
          LAST_RELEASE_TAG="${{ steps.merged-prs.outputs.last_release_tag }}"
          LAST_RELEASE_DATE="${{ steps.merged-prs.outputs.last_release_date }}"
          MERGED_PRS_ITEMS="${{ steps.merged-prs.outputs.items }}"

          if [ -n "$LAST_RELEASE_TAG" ]; then
            RELEASE_REF_TEXT="Last release: $LAST_RELEASE_TAG ($LAST_RELEASE_DATE)"
          else
            RELEASE_REF_TEXT="Last release: none found"
          fi

          set +e
          PR_OUTPUT=$(gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "Release preparation for $NEW_VERSION" \
            --reviewer "$TEAM_REVIEWER" \
            --body "$(cat <<EOF
          ## Release preparation for $NEW_VERSION

          This PR was generated automatically by the version bump workflow.

          ### Changes included
          - Updated all workspace package versions to $NEW_VERSION
          - Updated cross-package dependency versions
          - Updated lockfile

          ### Merged PRs since last release
          $RELEASE_REF_TEXT

          $MERGED_PRS_ITEMS

          ### Next steps
          1. Review and merge this PR
          2. Tag is created automatically after merge
          3. Publish workflow runs from the tag push
          EOF
          )" 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$PR_OUTPUT"

          if [ "$EXIT_CODE" -ne 0 ]; then
            if echo "$PR_OUTPUT" | grep -q "GitHub Actions is not permitted to create or approve pull requests"; then
              echo "❌ Pull request creation is blocked for GITHUB_TOKEN in this repository."
              echo "ℹ️  Enable 'Allow GitHub Actions to create and approve pull requests' in repository Actions settings."
            fi
            exit "$EXIT_CODE"
          fi

      - name: Pull Request summary
        if: steps.commit-changes.outputs.has_changes == 'true'
        run: |
          if [ "${{ steps.existing-pr.outputs.exists }}" = "true" ]; then
            echo "## Release PR" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Using existing PR: ${{ steps.existing-pr.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          else
            NEW_VERSION="${{ steps.version-root.outputs.new_version }}"
            RELEASE_BRANCH="${{ steps.push-branch.outputs.release_branch }}"
            echo "## Release PR" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Created PR for $NEW_VERSION from branch \`$RELEASE_BRANCH\`." >> $GITHUB_STEP_SUMMARY
          fi
